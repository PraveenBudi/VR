<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Driving Simulator - Training Mode</title>
    <!-- Include A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Include Custom scripts -->
    <script src="../src/vr-scene.js"></script>
    <script src="../src/vehicle-physics.js"></script>
    <script src="../src/environment-generator.js"></script>
  </head>
  <body>
    <!-- 2D Game HUD Overlay -->
    <div id="game-hud" style="position: absolute; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #00FF00; padding: 20px 30px; border-radius: 12px; font-family: 'Courier New', Courier, monospace; border: 3px solid #333; text-shadow: 0 0 5px #00FF00;">
      <div style="font-size: 3rem; font-weight: bold; line-height: 1;"><span id="hud-speed">0</span><span style="font-size: 1.2rem; color: #888; margin-left: 5px;">KM/H</span></div>
      <div style="font-size: 1.5rem; margin-top: 10px; border-top: 1px solid #444; padding-top: 5px;">GEAR: <span id="hud-gear" style="color: #FFF; font-weight: bold; font-size: 1.8rem;">P</span></div>
      <div style="font-size: 1.2rem; margin-top: 5px; color: #FFA500;">STEER: <span id="hud-steer" style="color: #FFF;">CENTER</span></div>
    </div>
    
    <!-- Explicit Driving Controls Overlay -->
    <div id="controls-panel" style="position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.7); color: #FFF; padding: 15px; border-radius: 8px; font-family: sans-serif; border-left: 5px solid #00FF00;">
       <h3 style="margin: 0 0 10px 0; color: #00FF00;">HOW TO DRIVE</h3>
       <ul style="margin: 0; padding-left: 20px; line-height: 1.5;">
          <li><b>W / Up Arrow:</b> Accelerate</li>
          <li><b>S / Down Arrow:</b> Brake / Reverse</li>
          <li><b>A / D / Left / Right:</b> Steer</li>
          <li><b>VR Mode:</b> Left Stick to Steer, Right Trigger/Grip to Gas/Brake</li>
       </ul>
       <p style="margin: 10px 0 0 0; font-size: 0.9rem; color: #F39C12;">* Caution: Do not crash into buildings or walls!</p>
    </div>

    <!-- HUD Logic -->
    <script>
      window.addEventListener('vehicle-telemetry', (e) => {
        document.getElementById('hud-speed').innerText = e.detail.speed;
        
        const gearEl = document.getElementById('hud-gear');
        gearEl.innerText = e.detail.gear;
        if (e.detail.gear === 'R') gearEl.style.color = '#FF3333';
        else if (e.detail.gear === 'D') gearEl.style.color = '#33FF33';
        else gearEl.style.color = '#FFFFFF';
        
        let steerText = 'CENTER';
        if (e.detail.steering < 0) steerText = `LEFT ${Math.abs(e.detail.steering)}%`;
        else if (e.detail.steering > 0) steerText = `RIGHT ${e.detail.steering}%`;
        document.getElementById('hud-steer').innerText = steerText;

        // Update 3D Interior Dashboard
        const dashSpeed = document.getElementById('3d-speed');
        if (dashSpeed) dashSpeed.setAttribute('value', e.detail.speed + ' KM/H');
        
        const dashGear = document.getElementById('3d-gear');
        if (dashGear) dashGear.setAttribute('value', 'GEAR: ' + e.detail.gear);
      });
    </script>

    <a-scene background="color: #61baff">
      
      <a-assets>
        <!-- The Realistic Ferrari Model -->
        <a-asset-item id="ferrari" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/models/gltf/ferrari.glb"></a-asset-item>
      </a-assets>

      <!-- Strong Daytime Lighting -->
      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#fffaeb" intensity="1.2" position="-5 15 5" castShadow="true"></a-light>

      <!-- Generate Huge 500m x 500m City Track with physical collision boundaries -->
      <a-entity city-track-generator></a-entity>

      <!-- Wayfinding Arrow pointing forward at start -->
      <a-entity position="0 2 -20" rotation="0 0 0" animation="property: position; dir: alternate; dur: 1000; to: 0 2.5 -20; loop: true">
         <a-triangle vertex-a="0 1 0" vertex-b="-1 -1 0" vertex-c="1 -1 0" color="#F1C40F" material="emissive: #F1C40F; emissiveIntensity: 1; blending: additive"></a-triangle>
      </a-entity>

      <!-- Player rig simulating a realistic car -->
      <a-entity id="vehicle" position="0 0.5 0" vehicle-physics="vehicleType: car; maxSpeed: 0.75;">
        
        <!-- The Realistic Ferrari GLB -->
        <a-gltf-model src="#ferrari" scale="1.5 1.5 1.5" position="0 -0.5 0" rotation="0 180 0"></a-gltf-model>
        
        <!-- We keep a fallback hit-box invisible for safety -->
        <a-box opacity="0" width="2" height="1" depth="4" position="0 0 0"></a-box>

        <!-- Driver Viewpoint Camera (positioned specifically inside the Ferrari driver seat) -->
        <a-entity position="-0.35 0.9 0.1">
          <a-camera></a-camera>
        </a-entity>
        
        <!-- Cabin Interior (Dashboard, Gauges, & Sound System) -->
        <a-entity position="0 0.8 -0.4" rotation="-20 0 0">
          <a-plane width="1.6" height="0.4" color="#1a1a1a" material="shader: flat"></a-plane>
          
          <!-- Car Sound System (Background Music looping) -->
          <a-sound src="url(https://assets.mixkit.co/music/preview/mixkit-driving-ambition-32.mp3)" autoplay="true" loop="true" volume="0.3"></a-sound>

          <!-- Instructions Text -->
          <a-text value="CONTROLS:" position="-0.75 0.1 0.01" color="#00FF00" width="2"></a-text>
          <a-text value="L-Stick=Steer | R-Trigger=Gas" position="-0.75 -0.05 0.01" color="#FFF" width="1.6" line-height="40"></a-text>
          
          <!-- Live Telemetry Gauges inside the car -->
          <a-text id="3d-speed" value="0 KM/H" position="0.3 0.1 0.01" color="#00FF00" width="3" align="center"></a-text>
          <a-text id="3d-gear" value="GEAR: P" position="0.3 -0.05 0.01" color="#FFA500" width="2" align="center"></a-text>

          <!-- Visual Steering Wheel -->
          <a-entity position="-0.35 -0.1 0.1" class="steering-wheel">
            <a-torus radius="0.18" radius-tubular="0.02" color="#111" material="metalness: 0.8; roughness: 0.2"></a-torus>
            <a-box width="0.34" height="0.03" depth="0.02" color="#444"></a-box>
            <a-box width="0.03" height="0.34" depth="0.02" color="#444"></a-box>
          </a-entity>
        </a-entity>
        
        <!-- VR Controllers -->
        <a-entity laser-controls="hand: left" vr-steering></a-entity>
        <a-entity laser-controls="hand: right" vr-pedals></a-entity>

      </a-entity>

    </a-scene>
  </body>
</html>
